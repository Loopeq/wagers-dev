services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/code/entrypoint.sh"]
    env_file:
      - .env
    ports:
      - 3859:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/code/src
      - .env:/code/.env
      - ./storage:/code/storage
      - ./migrations:/code/migrations
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=ERROR
    networks:
      - web

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 2s
      timeout: 5s
      retries: 10
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=ERROR
    networks:
      - web

  seed:
     build:
       context: .
       dockerfile: Dockerfile
     env_file:
       - .env
     depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
     command: python -m src.scripts.seed
     volumes:
       - ./src:/code/src
     environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=ERROR
     networks:
      - web

  redis:
    image: redis:7-alpine
    container_name: redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    networks:
      - web

  arq:
    build: .
    command: arq src.worker.worker.WorkerSettings
    depends_on:
      - web
      - redis
    env_file:
      - .env
    networks:
      - web
  
volumes:
  postgres-data:
  pgadmin-data:
  redis-data:

networks:
  web:
    external: true
